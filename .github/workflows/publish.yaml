name: Publish NuGet Package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # upgraded to v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4  # upgraded to v4
        with:
          dotnet-version: "8.0.x"

      - name: 🔐 Authenticate to GitHub Packages
        run: |
          SOURCE_URL="https://nuget.pkg.github.com/Quantum-Space-Org/index.json"
          SOURCE_NAME="github"
          
          if dotnet nuget list source | grep -q "$SOURCE_NAME"; then
            echo "🔄 Updating existing GitHub NuGet source..."
            dotnet nuget update source "$SOURCE_NAME" \
              --source "$SOURCE_URL" \
              --username "${{ github.actor }}" \
              --password "${{ secrets.GITHUB_TOKEN }}" \
              --store-password-in-clear-text
          else
            echo "➕ Adding GitHub NuGet source..."
            dotnet nuget add source "$SOURCE_URL" \
              --name "$SOURCE_NAME" \
              --username "${{ github.actor }}" \
              --password "${{ secrets.GITHUB_TOKEN }}" \
              --store-password-in-clear-text
          fi

      - name: 📦 Restore dependencies
        run: |
          # Find the solution file automatically
          SOLUTION_FILE=$(find . -maxdepth 2 -name "*.sln" | head -n 1)
          if [ -z "$SOLUTION_FILE" ]; then
            echo "❌ No solution file found!"
            exit 1
          fi
          echo "Restoring: $SOLUTION_FILE"
          dotnet restore "$SOLUTION_FILE"
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔨 Build the project
        run: |
          if [ -f "IaaC/build.sh" ]; then
            bash IaaC/build.sh
          else
            echo "⚠️ IaaC/build.sh not found, using default build"
            SOLUTION_FILE=$(find . -maxdepth 2 -name "*.sln" | head -n 1)
            dotnet build "$SOLUTION_FILE" --configuration Release --no-restore
          fi
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Publish packages to GitHub Packages
        run: |
          if [ -f "IaaC/publish.sh" ]; then
            bash IaaC/publish.sh
          else
            echo "❌ IaaC/publish.sh not found!"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Done
        run: echo "🎉 Package published from tag ${{ github.ref_name }}!"